name: Create arch

on:
  workflow_dispatch:
    inputs:
      update_group:
        description: 'Specific group to update (optional, leave empty for all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  paket-update:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x' # Adjust to match your SDK version

      - name: Restore Local Tools
        run: dotnet tool restore
        
      - name: Install Clean Architecture Template
        run: dotnet new --install Clean.Architecture.Solution.Template@10.4.1

      - name: Create Solution with Web API + SQLite
        run: dotnet new ca-sln -cf None -o ClinicManager --database sqlite
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Branch Configuration
          branch: feature/paket-update
          delete-branch: true
          
          # PR Content
          title: "Paket Dependency Update"
          body: |
            ## Manual Update Triggered
            
            This update was triggered manually by @${{ github.actor }}.
            
            **Changes:**
            - `paket.lock` (Updated versions)
            - `paket.references` (If applicable)
            
          # COMMIT IDENTITY CONFIGURATION
          # This maps the commit to the user who pressed the button
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          committer: GitHub <noreply@github.com>
          commit-message: "chore(deps): update paket dependencies"
          
          # Labels
          labels: |
            dependencies
            manual-trigger
